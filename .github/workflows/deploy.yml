name: Deploy to a2hosting via FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: FTP sync to nikita.albto.me
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          protocol: ftp
          port: 21
          log-level: verbose
          exclude: |
            .git/**
            .github/**
            archive/**
            screenshots/**
            screenshots_v2/**
            screenshots_live/**
            AGENTS.md
            CLAUDE.md
            DEPLOY.md
            README.md
            .gitignore
            __pycache__/**
            *.pyc
            *.swp
            *.swo
            _test_*.html
            _todo_*.md
            .directory
            .DS_Store
            Thumbs.db
